<!DOCTYPE html>
<html>
<head>
  <title>MetaMask 연결 테스트</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #f97316; color: white; border: none; border-radius: 8px; }
    button:disabled { opacity: 0.5; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 8px; white-space: pre-wrap; font-size: 13px; max-height: 400px; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #666; }
  </style>
</head>
<body>
  <h2>MetaMask 연결 테스트</h2>
  <p>이 페이지는 React/ethers 없이 순수 JavaScript로 MetaMask 연결만 테스트합니다.</p>
  <button id="btn" onclick="testConnect()">지갑 연결 테스트</button>
  <button onclick="resetAndRetry()" style="background:#666;margin-left:8px;">초기화 후 재시도</button>
  <pre id="log"></pre>

  <script>
    const logEl = document.getElementById('log');
    const btn = document.getElementById('btn');

    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    // 1) window.ethereum 존재 확인
    if (window.ethereum) {
      log('✅ window.ethereum 감지됨', 'ok');
      log('isMetaMask: ' + window.ethereum.isMetaMask);
      log('selectedAddress: ' + window.ethereum.selectedAddress);
    } else {
      log('❌ window.ethereum 없음 — MetaMask 미설치', 'err');
      btn.disabled = true;
    }

    // 2) 기존 연결 계정 확인 (passive)
    if (window.ethereum) {
      log('eth_accounts 호출 (passive)...');
      window.ethereum.request({ method: 'eth_accounts' })
        .then(accounts => {
          if (accounts.length > 0) {
            log('✅ 이미 연결된 계정: ' + accounts[0], 'ok');
          } else {
            log('기존 연결 없음 (정상)', 'info');
          }
        })
        .catch(err => log('❌ eth_accounts 실패: ' + err.message, 'err'));
    }

    // 3) 연결 테스트
    async function testConnect() {
      btn.disabled = true;
      btn.textContent = '연결 중...';
      log('--- 연결 시도 시작 ---');

      // 이미 연결된 계정 확인
      try {
        const existing = await window.ethereum.request({ method: 'eth_accounts' });
        log('eth_accounts 결과: ' + JSON.stringify(existing));
        if (existing.length > 0) {
          log('✅ 이미 연결됨: ' + existing[0], 'ok');
          btn.textContent = '✅ ' + existing[0].slice(0, 10) + '...';
          return;
        }
      } catch(e) {
        log('eth_accounts 실패: ' + e.message, 'err');
      }

      // 방법 1: wallet_requestPermissions
      log('wallet_requestPermissions 시도...');
      try {
        const perm = await Promise.race([
          window.ethereum.request({
            method: 'wallet_requestPermissions',
            params: [{ eth_accounts: {} }]
          }),
          new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT')), 10000))
        ]);
        log('✅ 권한 승인: ' + JSON.stringify(perm), 'ok');
        const a = await window.ethereum.request({ method: 'eth_accounts' });
        if (a.length > 0) {
          log('✅ 연결 성공: ' + a[0], 'ok');
          btn.textContent = '✅ ' + a[0].slice(0, 10) + '...';
          return;
        }
      } catch (e) {
        log('wallet_requestPermissions: ' + e.message, 'err');
        if (e.code === 4001) {
          btn.textContent = '거부됨 — 다시 시도';
          btn.disabled = false;
          return;
        }
      }

      // 방법 2: eth_requestAccounts
      log('eth_requestAccounts 시도...');
      try {
        const a2 = await Promise.race([
          window.ethereum.request({ method: 'eth_requestAccounts' }),
          new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT')), 10000))
        ]);
        if (a2.length > 0) {
          log('✅ 연결 성공: ' + a2[0], 'ok');
          btn.textContent = '✅ ' + a2[0].slice(0, 10) + '...';
          return;
        }
      } catch (e) {
        log('eth_requestAccounts: ' + e.message, 'err');
      }

      log('⚠️ 두 방법 모두 실패. MetaMask 확장 프로그램을 직접 열어서 이 사이트(localhost)에 계정을 수동 연결해보세요.', 'err');
      btn.textContent = '다시 시도';
      btn.disabled = false;
    }

    async function resetAndRetry() {
      log('--- 초기화 시도 ---');
      try {
        // wallet_revokePermissions로 기존 권한 초기화
        await window.ethereum.request({
          method: 'wallet_revokePermissions',
          params: [{ eth_accounts: {} }]
        });
        log('✅ 기존 권한 초기화됨', 'ok');
      } catch(e) {
        log('권한 초기화 실패 (무시): ' + e.message, 'info');
      }
      log('2초 후 연결 재시도...');
      setTimeout(() => testConnect(), 2000);
    }
  </script>
</body>
</html>

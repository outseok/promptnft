<!DOCTYPE html>
<html>
<head>
  <title>MetaMask 연결 테스트</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #f97316; color: white; border: none; border-radius: 8px; }
    button:disabled { opacity: 0.5; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 8px; white-space: pre-wrap; font-size: 13px; max-height: 400px; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #666; }
  </style>
</head>
<body>
  <h2>MetaMask 연결 테스트</h2>
  <p>이 페이지는 React/ethers 없이 순수 JavaScript로 MetaMask 연결만 테스트합니다.</p>
  <button id="btn" onclick="testConnect()">지갑 연결 테스트</button>
  <pre id="log"></pre>

  <script>
    const logEl = document.getElementById('log');
    const btn = document.getElementById('btn');

    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    // 1) window.ethereum 존재 확인
    if (window.ethereum) {
      log('✅ window.ethereum 감지됨', 'ok');
      log('isMetaMask: ' + window.ethereum.isMetaMask);
      log('selectedAddress: ' + window.ethereum.selectedAddress);
    } else {
      log('❌ window.ethereum 없음 — MetaMask 미설치', 'err');
      btn.disabled = true;
    }

    // 2) 기존 연결 계정 확인 (passive)
    if (window.ethereum) {
      log('eth_accounts 호출 (passive)...');
      window.ethereum.request({ method: 'eth_accounts' })
        .then(accounts => {
          if (accounts.length > 0) {
            log('✅ 이미 연결된 계정: ' + accounts[0], 'ok');
          } else {
            log('기존 연결 없음 (정상)', 'info');
          }
        })
        .catch(err => log('❌ eth_accounts 실패: ' + err.message, 'err'));
    }

    // 3) 연결 테스트
    async function testConnect() {
      btn.disabled = true;
      btn.textContent = '연결 중...';
      log('--- 연결 시도 시작 ---');

      try {
        // 1단계: wallet_requestPermissions (최신 MetaMask 필수)
        log('wallet_requestPermissions 호출...');
        await window.ethereum.request({
          method: 'wallet_requestPermissions',
          params: [{ eth_accounts: {} }]
        });
        log('✅ 권한 승인됨!', 'ok');

        // 2단계: 계정 조회
        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
        log('✅ 계정 수신: ' + JSON.stringify(accounts), 'ok');

        if (accounts[0]) {
          log('연결된 주소: ' + accounts[0], 'ok');
          const chainId = await window.ethereum.request({ method: 'eth_chainId' });
          log('체인 ID: ' + chainId + ' (' + parseInt(chainId, 16) + ')', 'info');
          btn.textContent = '✅ 연결됨: ' + accounts[0].slice(0, 8) + '...';
          log('--- 연결 성공! ---', 'ok');
        }
      } catch (err) {
        log('❌ wallet_requestPermissions 실패: code=' + err.code + ' msg=' + err.message, 'err');

        // 폴백: eth_requestAccounts
        if (err.code !== 4001) {
          log('eth_requestAccounts로 폴백 시도...');
          try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            log('✅ 폴백 성공: ' + JSON.stringify(accounts), 'ok');
            if (accounts[0]) {
              btn.textContent = '✅ 연결됨: ' + accounts[0].slice(0, 8) + '...';
              log('--- 연결 성공 (폴백)! ---', 'ok');
              return;
            }
          } catch (e2) {
            log('❌ 폴백도 실패: ' + e2.message, 'err');
          }
        }
        btn.textContent = '다시 시도';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>

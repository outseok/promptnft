<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전동 킥보드 대여 서비스 - SmartSwitch DApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>전동 킥보드 대여 서비스</h1>
        <p id="connectionStatus" class="status disconnected">Ganache 연결 중...</p>

        <!-- (3) 계정 선택 기능 -->
        <div class="section">
            <h2>계정 선택</h2>
            <label for="accountSelect">Ganache 계정 목록:</label>
            <select id="accountSelect"></select>
            <p>현재 선택된 계정: <strong id="currentAccount">-</strong></p>
            <p>계정 잔액: <strong id="accountBalance">-</strong> ETH</p>
        </div>

        <!-- (4) 킥보드 대여 기능 -->
        <div class="section">
            <h2>킥보드 대여하기</h2>
            <p>선택된 계정으로 1 ETH를 전송하여 킥보드를 대여합니다. (대여 시간: 300초)</p>
            <button id="btnRent">킥보드 대여하기</button>
            <div id="rentResult"></div>
        </div>

        <!-- (5) 조기 반납(환불 요청) 기능 -->
        <div class="section">
            <h2>조기 반납 (환불 요청)</h2>
            <label for="refundIndex">대여 번호 (index):</label>
            <input type="number" id="refundIndex" placeholder="대여 번호를 입력하세요" min="0">
            <button id="btnRefund">조기 반납 (환불 요청)</button>
            <div id="refundResult"></div>
        </div>

        <!-- (6) IoT 반납 처리 기능 -->
        <div class="section">
            <h2>IoT 반납 처리</h2>
            <p>IoT 장치 계정(accounts[3])으로 updateStatus를 호출합니다.</p>
            <label for="iotIndex">대여 번호 (index):</label>
            <input type="number" id="iotIndex" placeholder="대여 번호를 입력하세요" min="0">
            <button id="btnIoT">IoT 반납 처리</button>
            <div id="iotResult"></div>
        </div>

        <!-- (7) 상태 조회 기능 -->
        <div class="section">
            <h2>상태 조회</h2>
            <label for="queryIndex">대여 번호 (index):</label>
            <input type="number" id="queryIndex" placeholder="대여 번호를 입력하세요" min="0">
            <button id="btnQuery">조회</button>
            <div id="statusResult"></div>
            <hr style="margin: 15px 0;">
            <label>계약 잔액:</label>
            <div id="contractBalance">-</div>
            <label>선택된 계정 잔액:</label>
            <div id="selectedAccountBalance">-</div>
        </div>
    </div>

    <!-- Web3.js CDN (브라우저용 0.20.x - Ganache + Remix 호환) -->
    <script src="https://cdn.jsdelivr.net/npm/web3@0.20.7/dist/web3.min.js"></script>
    <!-- 분리된 앱 로직 -->
    <script src="app.js"></script>
</body>
</html>
